services:
  otterwiki:
    image: redimp/otterwiki:2
    restart: unless-stopped
    volumes:
      - ./app-data:/app-data
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.otterwiki.rule=Host(`wiki.euuuhh.org`)"
      - "traefik.http.services.otterwiki.loadbalancer.server.port=8080"
      - "traefik.http.routers.otterwiki.entrypoints=websecure"
      - "traefik.http.routers.otterwiki.tls=true"
networks:
  proxy:
    external: true