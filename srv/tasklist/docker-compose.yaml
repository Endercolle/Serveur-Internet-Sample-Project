services:
  db:
    image: anoufranqui/data:data
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - PORT=${PORT}
      - HOST=${HOST}
    volumes:
      - ./db_data:/var/lib/mysql
    networks:
      - proxy
    ports:
      - "3306:3306"
  backend:
    image: anoufranqui/backend:backend
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - PORT=${PORT}
      - HOST=${HOST}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`tasklist.euuuhh.org`) && PathPrefix(`/api/tasks`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
    networks:
      - proxy
    ports:
      - "3000:3000"
  frontend:
    container_name: tasklist-frontend
    image: anoufranqui/frontend:frontend
    networks:
      - proxy
    labels:
       - "traefik.enable=true"
       - "traefik.http.routers.tasklist.rule=Host(`tasklist.euuuhh.org`)"
       - "traefik.http.services.tasklist-frontend.loadbalancer.server.port=8080"
       - "traefik.http.routers.tasklist.middlewares=tinyauth"
       - "traefik.http.routers.tasklist.entrypoints=websecure"
       - "traefik.http.routers.tasklist.tls=true"
networks:
  proxy:
    external: true