services:
  traefik:
    image: "traefik:v3.6"
    container_name: "traefik"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--providers.docker.network=proxy"
      - "--log.level=DEBUG"
      - "--providers.file.directory=/dynamic"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./dynamic:/dynamic:ro"
      - "/etc/letsencrypt:/etc/letsencrypt:ro"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.rule=Host(`traefik.euuuhh.org`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))"
      - "traefik.http.routers.traefik.middlewares=tinyauth"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls=true"
  tinyauth:
    image: "ghcr.io/steveiliop56/tinyauth:v4"
    container_name: "tinyauth"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - "./data:/data"
    environment:
      - APP_URL=${APP_URL}
      - USERS=${USERS}
      - PROVIDER_GOOGLE_CLIENT_ID=${PROVIDER_GOOGLE_CLIENT_ID}
      - PROVIDER_GOOGLE_CLIENT_SECRET=${PROVIDER_GOOGLE_CLIENT_SECRET}
      - OAUTH_WHITELISTED_EMAILS=${OAUTH_WHITELISTED_EMAILS}
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tinyauth.rule=Host(`tinyauth.euuuhh.org`)"
      - "traefik.http.routers.tinyauth.entrypoints=websecure"
      - traefik.http.middlewares.tinyauth.forwardauth.address=http://tinyauth:3000/api/auth/traefik
      - "traefik.http.services.tinyauth.loadbalancer.server.port=3000"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.tinyauth.tls=true"

networks:
  proxy:
    external: true
